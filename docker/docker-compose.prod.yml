services:
  db:
    image: postgres:16-alpine
    container_name: hvc-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hellovibecoding
    volumes:
      - hvc_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: hvc-api
    restart: always
    env_file:
      - ../.env
    ports:
      - "3001:3001"
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: hvc-nginx
    restart: always
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  hvc_db_data:
